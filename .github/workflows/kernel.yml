name: kernel

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      google_ref:
        description: "Android common kernel tag to build. Empty means latest matching tag_pattern."
        required: false
        type: string
      tag_pattern:
        description: "Google tag glob used when google_ref is empty."
        required: false
        default: "android16-6.12.*_r*"
        type: string
      publish_release:
        description: "Upload artifacts to existing GitHub releases."
        required: false
        default: true
        type: boolean
      kernel_release_tag:
        description: "Existing release tag for kernel pacman packages."
        required: false
        type: string
      image_release_tag:
        description: "Existing release tag for the replace image package."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.google_ref || github.event.inputs.tag_pattern || 'android16-6.12' }}
  cancel-in-progress: false

jobs:
  build-kernel:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Google kernel tag
        id: kernel
        env:
          GOOGLE_REF: ${{ github.event.inputs.google_ref }}
          TAG_PATTERN: ${{ github.event.inputs.tag_pattern || 'android16-6.12.*_r*' }}
        run: |
          chmod +x scripts/resolve-google-kernel-ref.sh
          args=(--pattern "$TAG_PATTERN")
          if [ -n "$GOOGLE_REF" ]; then
            args+=(--ref "$GOOGLE_REF")
          fi
          scripts/resolve-google-kernel-ref.sh "${args[@]}" | tee kernel-version.env
          cat kernel-version.env >> "$GITHUB_ENV"

      - name: Resolve release tags
        id: releases
        env:
          KERNEL_RELEASE_TAG_INPUT: ${{ github.event.inputs.kernel_release_tag }}
          IMAGE_RELEASE_TAG_INPUT: ${{ github.event.inputs.image_release_tag }}
          KERNEL_REF: ${{ steps.kernel.outputs.KERNEL_GIT_REF }}
        run: |
          kernel_release_tag="${KERNEL_RELEASE_TAG_INPUT:-kernel-$KERNEL_REF}"
          image_release_tag="${IMAGE_RELEASE_TAG_INPUT:-archlinux-$(date -u +%Y.%m.%d)}"
          echo "KERNEL_RELEASE_TAG=$kernel_release_tag" >> "$GITHUB_OUTPUT"
          echo "IMAGE_RELEASE_TAG=$image_release_tag" >> "$GITHUB_OUTPUT"
          echo "Kernel release tag: $kernel_release_tag"
          echo "Image release tag: $image_release_tag"

      - name: Check existing releases
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          KERNEL_RELEASE_TAG: ${{ steps.releases.outputs.KERNEL_RELEASE_TAG }}
          IMAGE_RELEASE_TAG: ${{ steps.releases.outputs.IMAGE_RELEASE_TAG }}
        run: |
          for release_tag in "$KERNEL_RELEASE_TAG" "$IMAGE_RELEASE_TAG"; do
            if ! gh release view "$release_tag" >/dev/null 2>&1; then
              echo "Missing existing release: $release_tag" >&2
              exit 1
            fi
          done
          echo "Both target releases already exist."

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            adb \
            bc \
            bison \
            clang \
            cpio \
            dosfstools \
            e2fsprogs \
            fdisk \
            flex \
            git \
            kmod \
            libarchive-tools \
            libdw-dev \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            make \
            patch \
            python3 \
            qemu-user-static \
            systemd-container \
            zstd

      - name: Build kernel packages from Google tag
        run: |
          KERNEL_BUILD_BACKEND=host \
          KERNEL_GIT_REPO="$KERNEL_GIT_REPO" \
          KERNEL_GIT_REF="$KERNEL_GIT_REF" \
          KERNEL_VERSION="$KERNEL_VERSION" \
          make kernel-packages

      - name: Build installable replace package
        run: |
          make rootfs
          bash image/create-disk.sh
          bash image/assemble.sh
          make check

      - name: Package kernel and replace artifacts
        run: |
          mkdir -p dist
          kernel_package="arch-avf-kernel-${KERNEL_GIT_REF}.tar.gz"
          replace_package="archlinux-avf-aarch64-replace-${KERNEL_GIT_REF}.tar.gz"
          cp build/packages/*.pkg.tar.zst dist/
          tar -C build/kernel -czf "dist/$kernel_package" \
            vmlinuz \
            kernel.release \
            kernel.config \
            kernel.source \
            modules
          cp build/arch-avf-replace.tar.gz "dist/$replace_package"
          sha256sum dist/*.pkg.tar.zst "dist/$kernel_package" > "dist/SHA256SUMS.kernel"
          sha256sum "dist/$replace_package" > "dist/SHA256SUMS.image"

      - name: Upload kernel build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arch-avf-kernel-${{ steps.kernel.outputs.KERNEL_GIT_REF }}
          path: |
            dist/arch-avf-kernel-${{ steps.kernel.outputs.KERNEL_GIT_REF }}.tar.gz
            dist/*.pkg.tar.zst
            dist/archlinux-avf-aarch64-replace-${{ steps.kernel.outputs.KERNEL_GIT_REF }}.tar.gz
            dist/SHA256SUMS.kernel
            dist/SHA256SUMS.image
          if-no-files-found: error

      - name: Upload kernel release assets
        if: >
          (github.event_name == 'schedule' || github.event.inputs.publish_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.releases.outputs.KERNEL_RELEASE_TAG }}
          name: Kernel ${{ steps.kernel.outputs.KERNEL_GIT_REF }}
          make_latest: false
          files: |
            dist/arch-avf-kernel-${{ steps.kernel.outputs.KERNEL_GIT_REF }}.tar.gz
            dist/*.pkg.tar.zst
            dist/SHA256SUMS.kernel
          body: |
            Google-tracked kernel build for arch-avf.

            Source: `${{ steps.kernel.outputs.KERNEL_GIT_REPO }}`
            Google ref: `${{ steps.kernel.outputs.KERNEL_GIT_REF }}`
            Kernel version: `${{ steps.kernel.outputs.KERNEL_VERSION }}`
            Ref SHA: `${{ steps.kernel.outputs.KERNEL_REF_SHA }}`

            This workflow tracks Google's Android common kernel tags and publishes
            kernel pacman packages to an existing release.

            Kernel-only package:
            `arch-avf-kernel-${{ steps.kernel.outputs.KERNEL_GIT_REF }}.tar.gz`

            Pacman packages:
            `arch-avf-linux-android-*.pkg.tar.zst`
            `arch-avf-linux-android-firmware-*.pkg.tar.zst`

      - name: Upload image release assets
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.releases.outputs.IMAGE_RELEASE_TAG }}
          make_latest: false
          files: |
            dist/archlinux-avf-aarch64-replace-${{ steps.kernel.outputs.KERNEL_GIT_REF }}.tar.gz
            dist/SHA256SUMS.image
          body: |
            Arch Linux ARM image for Android 16 AVF Terminal app.

            This release publishes the production `replace` package only.
