name: kernel

on:
  schedule:
    - cron: "17 3 * * *"
  repository_dispatch:
    types: [linux-release]
  workflow_dispatch:
    inputs:
      google_ref:
        description: "Android common kernel tag to build. Empty means latest matching tag_pattern."
        required: false
        type: string
      tag_pattern:
        description: "Google tag glob used when google_ref is empty."
        required: false
        default: "android16-6.12.*_r*"
        type: string
      publish_release:
        description: "Upload artifacts to existing GitHub releases."
        required: false
        default: true
        type: boolean
      kernel_release_tag:
        description: "Existing release tag for kernel pacman packages. Defaults to vars.KERNEL_RELEASE_TAG."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.google_ref || github.event.inputs.tag_pattern || 'android16-6.12' }}
  cancel-in-progress: false

jobs:
  build-kernel:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Google kernel tag
        id: kernel
        env:
          GOOGLE_REF: ${{ github.event.inputs.google_ref }}
          TAG_PATTERN: ${{ github.event.inputs.tag_pattern || 'android16-6.12.*_r*' }}
        run: |
          chmod +x scripts/resolve-google-kernel-ref.sh
          args=(--pattern "$TAG_PATTERN")
          if [ -n "$GOOGLE_REF" ]; then
            args+=(--ref "$GOOGLE_REF")
          fi
          scripts/resolve-google-kernel-ref.sh "${args[@]}" | tee kernel-version.env
          cat kernel-version.env >> "$GITHUB_ENV"

      - name: Resolve release tag
        id: releases
        env:
          KERNEL_RELEASE_TAG_INPUT: ${{ github.event.inputs.kernel_release_tag || github.event.client_payload.kernel_release_tag || vars.KERNEL_RELEASE_TAG }}
          PUBLISH_RELEASE_INPUT: ${{ github.event.inputs.publish_release || github.event.client_payload.publish_release || 'true' }}
          KERNEL_REF: ${{ steps.kernel.outputs.KERNEL_GIT_REF }}
        run: |
          kernel_release_tag="$KERNEL_RELEASE_TAG_INPUT"
          if [ "$PUBLISH_RELEASE_INPUT" = "true" ] && [ -z "$kernel_release_tag" ]; then
            echo "kernel_release_tag is required for kernel builds" >&2
            exit 1
          fi
          echo "KERNEL_RELEASE_TAG=$kernel_release_tag" >> "$GITHUB_OUTPUT"
          echo "PUBLISH_RELEASE=$PUBLISH_RELEASE_INPUT" >> "$GITHUB_OUTPUT"
          echo "Kernel release tag: $kernel_release_tag"
          echo "Publish release: $PUBLISH_RELEASE_INPUT"

      - name: Check existing release
        id: existing
        if: steps.releases.outputs.PUBLISH_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          KERNEL_RELEASE_TAG: ${{ steps.releases.outputs.KERNEL_RELEASE_TAG }}
        run: |
          if ! gh release view "$KERNEL_RELEASE_TAG" >/dev/null 2>&1; then
            echo "Missing existing release: $KERNEL_RELEASE_TAG" >&2
            exit 1
          fi
          echo "Target kernel release already exists."

      - name: Check existing kernel assets
        id: assets
        if: steps.releases.outputs.PUBLISH_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          KERNEL_RELEASE_TAG: ${{ steps.releases.outputs.KERNEL_RELEASE_TAG }}
          KERNEL_ASSET: arch-avf-kernel-${{ steps.kernel.outputs.KERNEL_GIT_REF }}.tar.gz
        run: |
          if gh release view "$KERNEL_RELEASE_TAG" --json assets --jq '.assets[].name' | grep -Fx "$KERNEL_ASSET" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Kernel assets already exist for $KERNEL_ASSET"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install host tools
        if: steps.assets.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            adb \
            bc \
            bison \
            clang \
            cpio \
            dosfstools \
            e2fsprogs \
            fdisk \
            flex \
            git \
            kmod \
            libarchive-tools \
            libdw-dev \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            make \
            patch \
            python3 \
            qemu-user-static \
            systemd-container \
            zstd

      - name: Build kernel packages from Google tag
        if: steps.assets.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        run: |
          KERNEL_BUILD_BACKEND=host \
          KERNEL_GIT_REPO="$KERNEL_GIT_REPO" \
          KERNEL_GIT_REF="$KERNEL_GIT_REF" \
          KERNEL_VERSION="$KERNEL_VERSION" \
          make kernel-packages

      - name: Package kernel artifacts
        if: steps.assets.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p dist
          kernel_package="arch-avf-kernel-${KERNEL_GIT_REF}.tar.gz"
          cp build/packages/*.pkg.tar.zst dist/
          tar -C build/kernel -czf "dist/$kernel_package" \
            vmlinuz \
            kernel.release \
            kernel.config \
            kernel.source \
            modules
          sha256sum dist/*.pkg.tar.zst "dist/$kernel_package" > "dist/SHA256SUMS.kernel"

      - name: Upload kernel build artifacts
        if: steps.assets.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: arch-avf-kernel-${{ steps.kernel.outputs.KERNEL_GIT_REF }}
          path: |
            dist/arch-avf-kernel-${{ steps.kernel.outputs.KERNEL_GIT_REF }}.tar.gz
            dist/*.pkg.tar.zst
            dist/SHA256SUMS.kernel
          if-no-files-found: error

      - name: Upload kernel release assets
        if: >
          (steps.assets.outputs.exists != 'true' || github.event_name == 'workflow_dispatch') &&
          steps.releases.outputs.PUBLISH_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.releases.outputs.KERNEL_RELEASE_TAG }}
          name: Kernel ${{ steps.kernel.outputs.KERNEL_GIT_REF }}
          make_latest: false
          files: |
            dist/arch-avf-kernel-${{ steps.kernel.outputs.KERNEL_GIT_REF }}.tar.gz
            dist/*.pkg.tar.zst
            dist/SHA256SUMS.kernel
          body: |
            Google-tracked kernel build for arch-avf.

            Source: `${{ steps.kernel.outputs.KERNEL_GIT_REPO }}`
            Google ref: `${{ steps.kernel.outputs.KERNEL_GIT_REF }}`
            Kernel version: `${{ steps.kernel.outputs.KERNEL_VERSION }}`
            Ref SHA: `${{ steps.kernel.outputs.KERNEL_REF_SHA }}`

            This workflow tracks Google's Android common kernel tags and publishes
            kernel pacman packages to an existing release.

            Kernel-only package:
            `arch-avf-kernel-${{ steps.kernel.outputs.KERNEL_GIT_REF }}.tar.gz`

            Pacman packages:
            `arch-avf-linux-android-*.pkg.tar.zst`
            `arch-avf-linux-android-firmware-*.pkg.tar.zst`
