name: build

on:
  push:
    branches: [main]
    tags: ["v*", "archlinux-*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            adb \
            dosfstools \
            e2fsprogs \
            fdisk \
            qemu-user-static \
            systemd-container

      - name: Build kernel
        run: make kernel

      - name: Build rootfs
        run: make rootfs

      - name: Build payload
        run: |
          bash image/create-disk.sh
          bash image/assemble.sh
          make check

      - name: Package payload
        run: |
          cp build/arch-avf-replace.tar.gz archlinux-avf-aarch64-replace.tar.gz
          sha256sum archlinux-avf-aarch64-replace.tar.gz > archlinux-avf-aarch64-replace.tar.gz.sha256

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v') || (startsWith(github.ref, 'refs/tags/archlinux-') && !contains(github.ref, 'before-'))
        uses: softprops/action-gh-release@v2
        with:
          files: |
            archlinux-avf-aarch64-replace.tar.gz
            archlinux-avf-aarch64-replace.tar.gz.sha256
          body: |
            Arch Linux ARM image for Android 16 AVF Terminal app.

            This release publishes the production `replace` package only.

            Production/user builds: install Google's Debian Terminal image first, extract `archlinux-avf-aarch64-replace.tar.gz` to `Download/image`, then run `bash /mnt/shared/Download/image/replace.sh` inside Terminal. Terminal will reboot; reopen it and let the script finish the second stage.
