name: Build Image

on:
  schedule:
    - cron: "47 4 2 * *"
  repository_dispatch:
    types: [kernel-release]
  workflow_dispatch:
    inputs:
      kernel_release_tag:
        description: "Existing release tag to download kernel pacman packages from. Defaults to vars.KERNEL_RELEASE_TAG."
        required: false
        type: string
      image_release_tag:
        description: "Existing release tag to upload the replace image into. Defaults to vars.IMAGE_RELEASE_TAG."
        required: false
        type: string
      publish_release:
        description: "Upload replace image assets to the existing image release."
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build image
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Resolve build inputs
        id: inputs
        env:
          KERNEL_RELEASE_TAG_INPUT: ${{ github.event.inputs.kernel_release_tag || github.event.client_payload.kernel_release_tag || vars.KERNEL_RELEASE_TAG }}
          IMAGE_RELEASE_TAG_INPUT: ${{ github.event.inputs.image_release_tag || github.event.client_payload.image_release_tag || vars.IMAGE_RELEASE_TAG }}
          PUBLISH_RELEASE_INPUT: ${{ github.event.inputs.publish_release || github.event.client_payload.publish_release || 'true' }}
        run: |
          kernel_release_tag="$KERNEL_RELEASE_TAG_INPUT"
          image_release_tag="$IMAGE_RELEASE_TAG_INPUT"
          if [ -z "$kernel_release_tag" ]; then
            echo "kernel_release_tag is required for image builds" >&2
            exit 1
          fi
          if [ "$PUBLISH_RELEASE_INPUT" = "true" ] && [ -z "$image_release_tag" ]; then
            echo "image_release_tag is required for image builds" >&2
            exit 1
          fi
          echo "KERNEL_RELEASE_TAG=$kernel_release_tag" >> "$GITHUB_OUTPUT"
          echo "IMAGE_RELEASE_TAG=$image_release_tag" >> "$GITHUB_OUTPUT"
          echo "PUBLISH_RELEASE=$PUBLISH_RELEASE_INPUT" >> "$GITHUB_OUTPUT"
          echo "Kernel release tag: $kernel_release_tag"
          echo "Image release tag: $image_release_tag"
          echo "Publish release: $PUBLISH_RELEASE_INPUT"

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            adb \
            bc \
            bison \
            clang \
            dosfstools \
            e2fsprogs \
            fdisk \
            flex \
            kmod \
            libarchive-tools \
            make \
            qemu-user-static \
            systemd-container \
            zstd

      - name: Download kernel release assets
        env:
          GH_TOKEN: ${{ github.token }}
          KERNEL_RELEASE_TAG: ${{ steps.inputs.outputs.KERNEL_RELEASE_TAG }}
        run: |
          gh release view "$KERNEL_RELEASE_TAG" >/dev/null
          mkdir -p build/kernel build/packages
          gh release download "$KERNEL_RELEASE_TAG" \
            --pattern '*.pkg.tar.zst' \
            --dir build/packages \
            --clobber
          kernel_pkg="$(find build/packages -maxdepth 1 -name 'arch-avf-linux-android-[0-9]*.pkg.tar.zst' | sort | tail -n 1)"
          [ -n "$kernel_pkg" ] || { echo "Missing arch-avf-linux-android pacman package in $KERNEL_RELEASE_TAG" >&2; exit 1; }
          rm -rf build/kernel-pkg
          mkdir -p build/kernel-pkg
          bsdtar -xf "$kernel_pkg" -C build/kernel-pkg
          cp build/kernel-pkg/boot/vmlinuz-arch-avf-linux-android build/kernel/vmlinuz
          cp build/kernel-pkg/boot/Image.gz build/kernel/Image.gz
          cp build/kernel-pkg/usr/share/arch-avf-linux-android/kernel.release build/kernel/kernel.release
          cp build/kernel-pkg/usr/share/arch-avf-linux-android/config build/kernel/kernel.config
          cp build/kernel-pkg/usr/share/arch-avf-linux-android/source build/kernel/kernel.source
          mkdir -p build/kernel/modules/lib
          cp -a build/kernel-pkg/usr/lib/modules build/kernel/modules/lib/
          test -s build/kernel/vmlinuz
          test -s build/kernel/kernel.release
          test -s build/kernel/kernel.source
          test -d build/kernel/modules/lib/modules
          compgen -G 'build/packages/*.pkg.tar.zst' >/dev/null
          # Kernel releases are reused, so they can contain older package names
          # when a previous cleanup failed. Keep only the pacman packages
          # matching the kernel package selected above.
          # shellcheck disable=SC1091
          source build/kernel/kernel.source
          kernel_pkgver="$(printf '%s' "${KERNEL_VERSION}_${KERNEL_GIT_REF}" | sed 's/[^A-Za-z0-9_+.]/_/g')"
          find build/packages -maxdepth 1 -type f -name '*.pkg.tar.zst' ! -name "*-${kernel_pkgver}-*.pkg.tar.zst" -delete
          ls -lh build/packages/*.pkg.tar.zst
          test "$(find build/packages -maxdepth 1 -type f -name '*.pkg.tar.zst' | wc -l)" -eq 2

      - name: Build rootfs
        run: make rootfs

      - name: Build payload
        run: |
          bash image/create-disk.sh
          bash image/assemble.sh
          make check

      - name: Package payload
        run: |
          cp build/arch-avf-replace.tar.gz archlinux-avf-aarch64-replace.tar.gz
          sha256sum archlinux-avf-aarch64-replace.tar.gz > archlinux-avf-aarch64-replace.tar.gz.sha256

      - name: Check existing release
        if: steps.inputs.outputs.PUBLISH_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.inputs.outputs.IMAGE_RELEASE_TAG }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Missing existing release: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Upload image release assets
        if: steps.inputs.outputs.PUBLISH_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.inputs.outputs.IMAGE_RELEASE_TAG }}
          make_latest: false
          files: |
            archlinux-avf-aarch64-replace.tar.gz
            archlinux-avf-aarch64-replace.tar.gz.sha256
          body: |
            Arch Linux ARM image for Android 16 AVF Terminal app.

            This release publishes the production `replace` package only. Kernel pacman packages are published separately in the configured kernel release.

            Production/user builds: install Google's Debian Terminal image first, extract `archlinux-avf-aarch64-replace.tar.gz` to `Download/image`, then run `bash /mnt/shared/Download/image/replace.sh` inside Terminal. Terminal will reboot; reopen it and let the script finish the second stage.
