users:
  - default
  - name: droid
    gecos: Default user for Terminal App
    lock_passwd: false
    groups: [wheel, sudo, video, render, seat]
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    uid: 1000

disable_root: false
preserve_hostname: false

cloud_init_modules:
  - seed_random
  - bootcmd
  - write-files
  - growpart
  - resizefs
  - set_hostname
  - update_hostname
  - update_etc_hosts
  - ca-certs
  - users-groups
  - ssh

cloud_config_modules:
  - locale
  - set-passwords
  - ntp
  - timezone
  - runcmd

cloud_final_modules:
  - scripts-vendor
  - scripts-per-once
  - scripts-per-boot
  - scripts-per-instance
  - scripts-user
  - ssh-authkey-fingerprints
  - final-message
